<h3></h3>Ibis French est une plateforme conçue par les étudiants, pour les étudiants. Elle a été entièrement imaginée et développée par Fatima Kane, avec l’aide de Yadiel Cruz, au printemps 2026 dans le cadre de leur stage en français.
L’objectif de la plateforme est d’offrir un accompagnement et des outils de pratique en grammaire française aux étudiants inscrits aux cours de français intermédiaire à l’Université de Miami.</h3>
